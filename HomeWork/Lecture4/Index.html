<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <div>
    <form>
        <Label for="Firstname">First name</Label> <br>
        <input type="text" placeholder="Enter your name"> <br>
        <br>
        <label for="LastName">Last Name</label> <br>
        <input type="email" placeholder="Enter your email"><br>
        <br>
        <button type="submit">Submit</button>
    </form>
    </div>

    
    <form>
        <div>
            <br>
           <input type="checkbox" name="privacy Policy" value="Bike"> I agree to the privacy policy <br>
           <!-- Through this we can ask the user to agree to the privacy policy before submitting the form. 
           We can also use this for other purposes like asking the user to subscribe to our newsletter 
           or asking them to agree to our terms and conditions. -->
        </div>
    </form>


    <div>
        <form>
            <br>
            <input type="button" value="Click to Proceed" onclick="alert('Button Clicked')" a href="https://www.w3schools.com/html/html_form_input_types.asp"><br>
            <!-- Through this we warn the user that they have clicked the button and will go on the next page and leave this page. We can also perform some action on click of this button.
             Question: How to add a link in this button? -->
        </form>
    </div>


    <form>
        <div>
            <br>
            <input type="color" value="Submit">
                <!-- Through this we can ask the user to select a color from the color picker. 
                 Question: Where and why we use this? -->
        </div>


        <div>
            <br>
            <input type="date">
                <!-- Through this we can ask the user to select a date from the date picker. -->
        </div>


        <div>
            <br>
            <input type="datetime-local">
                <!-- Through this we can ask the user to select a date & time from the datetime picker.-->
        </div>

        <div>
            <br>
            <input type="email">
                <!-- Through this we can ask the user to enter an email address. This will also validate the email address and show an error message if the email address is not valid. -->
        </div>


        <div>
            <br>
            <input type="file" action="/upload" method="post" enctype="multipart/form-data">
                <!-- Through this we can ask the user to select a file from their computer. This is used for uploading files to the server. -->
            <br>
            <br><input type="button" Value ="Upload file">
        </div>

        <div>
            <br>
            <input type="hidden" name="userId" value="12345">
                <!-- Through this we can send some hidden data to the server. 
                 Question Why we use this? -->
        </div>

        <div>
            <br>
            <input type="month">
                <!-- Through this we can ask the user to select a month and year from the month picker. -->
        </div>

                <div>
            <br>
            <input type="Image" src="./images.jfif" width="500" height="500">
                <!-- Through this we can use an image. -->
        </div>


        <div>
            <br>
            <input type="number">
                <!-- Through this we can ask the user to enter a number. This will also validate the number and show an error message if the number is not valid. -->
        </div>


        <div>
            <br>
            <label>
                Password
            </label>
            <br><input type="password">
        </div>

        <div>
            <input type="radio">
        </div>


    </form>


</body>
</html>
