<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework</title>
</head>
<body>


    <div>
    <fieldset>

        <Legend>
            Application form
        </Legend>


        <form>
            <label for="fname">Full Name</label>
            <input type="text" name="fname" id="fname">
            <label for="lname">Last Name</label>
            <input type="text" name="lname" id="lname">
            <br>


            <br><label for="DOB">Date of Birth</label>
            <input type="date">
            <label for="age">Age</label>
            <input type="number">
            <br>


            <br> <label for="gender">Gender</label>
            <select name="Gender" id="Gender">
                <option value="Gender">Male</option>
                <option value="Gender">Female</option>
            </select>

            <label for="email">Enter email address:</label>
            <input type="email" name="email" id="email">
            <br>

            <br><label for="select">Position available:</label>
            <input type="radio" name="select" id="Junior Devolper">
            <label for="Junior Devolper">Junior Devolper</label>


            <input type="radio" name="select" id="Mid-level Devolper">
            <label for="Mid-level Devolper">Mid-level Devolper</label>


            <input type="radio" name="select" id="Senior Devolper">
            <label for="Senior Devolper">Senior Devolper</label> <br>


            <br> <label for="Language">Programing language:</label>
            <input type="checkbox" name="Language" id="Java">
            <label for="Java">Java</label>
            <input type="checkbox" name="Language" id="JavaScript">
            <label for="JavaScript">JavaScript</label>
            <input type="checkbox" name="Language" id="Python">
            <label for="Python">Python</label> <br>

            <br>
            <label for="Password">Password</label>
            <input type="text">
            <label for="Cpossword">Confirm Password</label>
            <input type="text"><br>


            <br>
            <input type="submit" name="submit" id="Submit">
            <input type="reset" name="reset" id="Reset">

        </form>


    </fieldset>
    </div>


</body>
</html>
